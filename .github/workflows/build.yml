name: Build and Push PHP Base Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag ref
        id: ref
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push PHP ${{ matrix.php }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.php }}
          push: true
          tags: |
            ghcr.io/zynqa/magezero-php:${{ matrix.php }}-fpm
            ghcr.io/zynqa/magezero-php:${{ matrix.php }}-fpm-${{ steps.ref.outputs.tag }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Published images to GHCR for tag `${{ github.ref_name }}`:

            - `ghcr.io/zynqa/magezero-php:7.4-fpm-${{ github.ref_name }}` (legacy, EOL)
            - `ghcr.io/zynqa/magezero-php:8.1-fpm-${{ github.ref_name }}`
            - `ghcr.io/zynqa/magezero-php:8.2-fpm-${{ github.ref_name }}`
            - `ghcr.io/zynqa/magezero-php:8.3-fpm-${{ github.ref_name }}`

            Floating tags `:{php}-fpm` have also been updated to point at this build.
